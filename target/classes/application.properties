# ==============================================
# CONFIGURAÇÃO DA APLICAÇÃO - PRODUTOS
# ==============================================

# Porta: usa a variável PORT do Render, ou 8080 local
server.port=${PORT:8080}

# ==============================================
# BANCO DE DADOS H2 (em memória)
# ==============================================
# Não precisa instalar nada! O H2 sobe junto com a aplicação.
# DB_CLOSE_DELAY=-1 mantém o banco vivo enquanto a JVM estiver rodando.
spring.datasource.url=jdbc:h2:mem:produtosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==============================================
# JPA / HIBERNATE
# ==============================================
# Dialeto específico do H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# "update" cria/atualiza as tabelas automaticamente ao iniciar
spring.jpa.hibernate.ddl-auto=update
# Mostra os SQLs gerados no console (útil para aprendizado)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================================
# CONSOLE DO H2 (para inspecionar o banco)
# ==============================================
# Acesse: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:produtosdb  |  User: sa  |  Senha: (vazio)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================
# THYMELEAF
# ==============================================
# Desativa cache para facilitar o desenvolvimento (recarrega templates)
spring.thymeleaf.cache=false
